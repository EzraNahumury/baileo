name: Baileo deposit cron

# 4x/day (UTC): 02:17, 08:17, 14:17, 20:17 -> 100 deposits/run = 400 tx/day.
# Off-peak minute (:17) and hours that dodge the 00:00 UTC stampede, where
# GitHub drops/delays scheduled runs hardest. Still best-effort, never exact.
# Scheduled workflows only run from the default branch and pause after 60 days
# of repo inactivity (a push re-enables them).
on:
  schedule:
    - cron: '17 2,8,14,20 * * *'
  workflow_dispatch: {}   # allow manual run for testing

# Avoid overlapping runs if one is still going when the next fires.
concurrency:
  group: baileo-deposit
  cancel-in-progress: false

jobs:
  deposit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run deposits
        env:
          WALLET_KEYS: ${{ secrets.WALLET_KEYS }}
          RPC: https://forno.celo.org
        run: |
          [ -n "$WALLET_KEYS" ] || { echo "secret WALLET_KEYS is empty"; exit 1; }
          umask 077
          printf '%s\n' "$WALLET_KEYS" > "$RUNNER_TEMP/keys.txt"
          KEYS_FILE="$RUNNER_TEMP/keys.txt" bash cron-baileo/deposit-run.sh
